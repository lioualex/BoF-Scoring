<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="theme-color" content="#0A0A0A">
  <title>BoF Scoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      height: 100%;
      background: #0A0A0A;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    #root { height: 100%; display: flex; flex-direction: column; }
    :root {
      --gold: #C8A946;
      --gold-light: #E8CC6A;
      --gold-dim: rgba(200,169,70,0.15);
      --bg: #0A0A0A;
      --surface: #111111;
      --card: #161616;
      --card2: #1E1E1E;
      --border: #222222;
      --border2: #2E2E2E;
      --text: #FFFFFF;
      --text2: #888888;
      --text3: #444444;
      --red: #E53935;
      --green: #4CAF50;
      --nav-h: 64px;
    }
    .page { flex: 1; overflow-y: auto; padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom)); }
    .page::-webkit-scrollbar { display: none; }
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: #0D0D0D;
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; background: none; border: none;
      color: var(--text3); cursor: pointer; transition: color 0.2s; padding: 8px 0;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn.active { color: var(--gold); }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .header {
      padding: 16px 20px 0;
      padding-top: calc(16px + env(safe-area-inset-top));
    }
    .app-title { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; }
    .app-title span { color: var(--gold); }
    .app-sub { font-size: 11px; color: var(--text2); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text2); margin: 20px 20px 8px;
    }
    .div-toggle {
      display: flex; margin: 16px 20px 0; background: var(--surface);
      border-radius: 10px; border: 1px solid var(--border); overflow: hidden;
    }
    .div-btn {
      flex: 1; padding: 10px 0; font-size: 12px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; background: none;
      border: none; color: var(--text2); cursor: pointer; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .div-btn.active { background: var(--gold); color: #000; }
    .team-card {
      margin: 0 20px 8px; background: var(--card);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; display: flex; align-items: center; gap: 14px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s;
    }
    .team-card:active { border-color: var(--gold); }
    .rank-badge {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--border2); color: var(--text2);
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .rank-badge.top1 { background: var(--gold); color: #000; }
    .rank-badge.top2 { background: #888; color: #000; }
    .rank-badge.top3 { background: #7B4F1F; color: #fff; }
    .team-name { font-size: 14px; font-weight: 600; flex: 1; }
    .team-record { font-size: 13px; font-weight: 700; color: var(--gold); }
    .team-pct { font-size: 11px; color: var(--text2); margin-left: 4px; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 200; display: flex; flex-direction: column;
      justify-content: flex-end;
    }
    .modal {
      background: #111; border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--border2);
      max-height: 85vh; display: flex; flex-direction: column;
    }
    .modal-handle {
      width: 36px; height: 4px; background: var(--border2);
      border-radius: 2px; margin: 12px auto 0;
    }
    .modal-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-title { font-size: 18px; font-weight: 800; }
    .modal-close {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--border2); border: none; color: var(--text2);
      font-size: 16px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .modal-body { overflow-y: auto; padding: 12px 20px 32px; }
    .modal-body::-webkit-scrollbar { display: none; }
    .schedule-week {
      margin-bottom: 20px;
    }
    .week-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .week-num { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); }
    .week-date { font-size: 13px; color: var(--text2); }
    .slot-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .slot-row:last-child { border-bottom: none; }
    .slot-time { font-size: 11px; color: var(--text2); width: 36px; flex-shrink: 0; padding-top: 2px; }
    .court-col { flex: 1; }
    .court-label { font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); margin-bottom: 3px; }
    .match-info { font-size: 12px; font-weight: 600; color: var(--text); }
    .ref-info { font-size: 10px; color: var(--text2); margin-top: 1px; }
    .badge {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 2px 6px; border-radius: 4px;
      display: inline-block;
    }
    .badge-setup { background: rgba(67,160,71,0.2); color: #4CAF50; }
    .badge-takedown { background: rgba(229,57,53,0.2); color: #E53935; }
    .badge-ref { background: var(--dim-gold); color: var(--gold); }

    /* SCORE PAGE */
    .score-page { display: flex; flex-direction: column; height: 100%; }
    .score-header {
      padding: 16px 20px;
      padding-top: calc(16px + env(safe-area-inset-top));
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .score-header-left { flex: 1; }
    .court-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); }
    .score-week-info { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .score-main {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; padding: 0 16px;
      position: relative;
    }
    .teams-row {
      display: flex; gap: 8px; align-items: stretch;
    }
    .team-scorer {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 12px; padding: 20px 8px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px;
    }
    .team-scorer.winner { border-color: var(--gold); background: var(--gold-dim); }
    .scorer-name {
      font-size: 13px; font-weight: 700; text-align: center;
      letter-spacing: -0.2px; color: var(--text2);
    }
    .scorer-name.winner-name { color: var(--gold); }
    .score-display {
      font-size: 80px; font-weight: 900; line-height: 1;
      letter-spacing: -4px; color: var(--text);
    }
    .score-display.winner-score { color: var(--gold); }
    .score-btn {
      width: 64px; height: 64px; border-radius: 50%;
      border: none; cursor: pointer; font-size: 28px; font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, opacity 0.1s;
      user-select: none;
    }
    .score-btn:active { transform: scale(0.92); }
    .score-btn-plus { background: var(--gold); color: #000; width: 72px; height: 72px; font-size: 32px; }
    .score-btn-minus { background: var(--border2); color: var(--text2); width: 48px; height: 48px; font-size: 22px; }
    .score-btn:disabled { opacity: 0.3; cursor: default; }
    .score-note {
      text-align: center; font-size: 10px; color: var(--text3);
      letter-spacing: 0.05em; margin: 8px 0;
    }
    .win-banner {
      text-align: center; padding: 10px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--gold);
      background: var(--gold-dim); border-radius: 8px; margin: 8px 0;
    }
    .mini-court {
      position: absolute; bottom: 16px; right: 16px;
      background: #0D0D0D; border: 1px solid var(--border2);
      border-radius: 10px; padding: 8px 12px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .mini-label { font-size: 8px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
    .mini-scores { display: flex; align-items: center; gap: 8px; }
    .mini-team { font-size: 10px; color: var(--text2); }
    .mini-score { font-size: 18px; font-weight: 900; color: var(--text); }
    .mini-vs { font-size: 9px; color: var(--text3); }
    .game-picker {
      padding: 20px;
    }
    .game-pick-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .game-pick-sub { font-size: 12px; color: var(--text2); margin-bottom: 20px; }
    .week-section { margin-bottom: 24px; }
    .week-section-title {
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 10px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .game-option {
      padding: 14px 16px; background: var(--card);
      border: 1px solid var(--border); border-radius: 12px;
      margin-bottom: 8px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s;
    }
    .game-option:active { border-color: var(--gold); }
    .game-option-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .game-option-teams { font-size: 14px; font-weight: 700; }
    .game-option-time { font-size: 11px; color: var(--text2); }
    .game-option-bottom { font-size: 11px; color: var(--text2); }
    .game-complete-badge { font-size: 10px; font-weight: 700; color: var(--green); letter-spacing: 0.1em; }

    /* ALL STARS PAGE */
    .allstar-section { margin-bottom: 24px; }
    .allstar-game-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; margin-bottom: 12px;
    }
    .allstar-game-header {
      padding: 12px 16px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .allstar-game-title { font-size: 13px; font-weight: 700; }
    .allstar-ref { font-size: 11px; color: var(--text2); }
    .allstar-teams { display: flex; gap: 0; }
    .allstar-team-col {
      flex: 1; padding: 12px 16px;
      border-right: 1px solid var(--border);

    .allstar-team-col:last-child { border-right: none; }
    .allstar-team-name { font-size: 11px; font-weight: 700; color: var(--gold); margin-bottom: 8px; letter-spacing: 0.05em; }
    .player-select {
      width: 100%; background: var(--surface); border: 1px solid var(--border2);
      color: var(--text); border-radius: 8px; padding: 8px 10px;
      font-size: 12px; font-family: inherit; appearance: none;
      cursor: pointer;
    }
    .player-select:focus { outline: none; border-color: var(--gold); }
    .allstar-leaderboard { margin: 0 20px; }
    .allstar-row {

    .allstar-row:last-child { border-bottom: none; }
    .allstar-rank { font-size: 11px; color: var(--text3); width: 20px; text-align: right; }
    .allstar-player { flex: 1; font-size: 14px; font-weight: 600; }
    .allstar-team-tag { font-size: 10px; color: var(--text2); }
    .allstar-count {

    .week-pill-row {

    .week-pill {
      padding: 6px 14px; border-radius: 20px;
      background: var(--card); border: 1px solid var(--border);
      font-size: 12px; font-weight: 600; color: var(--text2);
      cursor: pointer; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .week-pill.active { background: var(--gold); color: #000; border-color: var(--gold); }

    /* SCHEDULE PAGE */
    .full-schedule-week {
      margin: 0 20px 24px;
    }
    .full-week-header {

    .full-week-num { font-size: 16px; font-weight: 800; }
    .full-week-date { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .full-week-right { text-align: right; }
    .net-badges { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; }
    .full-slot {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 6px; overflow: hidden;

    .full-slot-time {
      padding: 6px 14px; background: var(--surface);
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text2);
      border-bottom: 1px solid var(--border);
    }
    .full-slot-courts { display: flex; }
    .full-court {
      flex: 1; padding: 10px 14px;
      border-right: 1px solid var(--border);
    }
    .full-court:last-child { border-right: none; }
    .full-court-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text3); margin-bottom: 5px;
    }
    .full-match { font-size: 13px; font-weight: 700; color: var(--text); }
    .full-match.empty { color: var(--text3); font-style: italic; font-weight: 400; font-size: 11px; }
    .full-ref { font-size: 10px; color: var(--text2); margin-top: 3px; }
    .result-score { font-size: 11px; font-weight: 700; color: var(--green); margin-top: 3px; }

    /* utility */
    .px20 { padding: 0 20px; }
    .mt8 { margin-top: 8px; }
    .mt16 { margin-top: 16px; }
    .flex-center { display: flex; align-items: center; justify-content: center; }
    .empty-state { padding: 40px 20px; text-align: center; color: var(--text3); }
    .empty-state-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text2); }
    .divider { height: 1px; background: var(--border); margin: 0 20px; }
    .back-btn {
      background: none; border: none; color: var(--gold);
      font-size: 14px; font-weight: 600; cursor: pointer;
      padding: 4px 0; display: flex; align-items: center; gap: 6px;
    }
    .done-btn {
      background: var(--gold); color: #000; border: none;
      border-radius: 12px; padding: 14px; width: 100%;
      font-size: 15px; font-weight: 800; cursor: pointer;
      letter-spacing: 0.05em; margin-top: 16px;
      -webkit-tap-highlight-color: transparent;
    }
    .reset-btn {
      background: var(--border2); color: var(--text2); border: none;
      border-radius: 12px; padding: 12px; width: 100%;
      font-size: 13px; font-weight: 600; cursor: pointer;
      margin-top: 8px; -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>

// =================== UTILITIES ===================

const getTeam = (div, id) => (div === 'adv' ? ADV_TEAMS : INT_TEAMS).find(t => t.id === id);
const getTeamName = (div, id) => getTeam(div, id)?.name || `Team ${id}`;
const getSchedule = (div) => div === 'adv' ? ADV_SCHEDULE : INT_SCHEDULE;

const gameKey = (div, week, slotIdx, court) => `${div}_w${week}_s${slotIdx}_c${court}`;

function checkWinner(sA, sB) {
  if (sA >= 27) return 'A';
  if (sB >= 27) return 'B';
  if (sA >= 25 && sA - sB >= 2) return 'A';
  if (sB >= 25 && sB - sA >= 2) return 'B';
  return null;
}

function useStorage(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
    catch { return init; }
  });
  const save = useCallback((v) => {
    setVal(v);
    try { localStorage.setItem(key, JSON.stringify(v)); } catch {}
  }, [key]);
  return [val, save];
}

function computeStandings(div, results) {
  const teams = div === 'adv' ? ADV_TEAMS : INT_TEAMS;
  const schedule = getSchedule(div);
  const rec = {};
  teams.forEach(t => { rec[t.id] = { wins: 0, losses: 0 }; });
  schedule.forEach(wk => {
    wk.slots.forEach((slot, si) => {
      ['court1','court2'].forEach((ct, ci) => {
        const g = slot[ct];
        if (!g) return;
        const k = gameKey(div, wk.week, si, ci+1);
        const r = results[k];
        if (r && r.winner) {
          const winner = r.winner === 'A' ? g.a : g.b;
          const loser  = r.winner === 'A' ? g.b : g.a;
          if (rec[winner]) rec[winner].wins++;
          if (rec[loser])  rec[loser].losses++;
        }
      });
    });
  });
  return teams.map(t => ({
    ...t,
    wins: rec[t.id].wins,
    losses: rec[t.id].losses,
    pct: rec[t.id].wins + rec[t.id].losses === 0 ? 0
      : rec[t.id].wins / (rec[t.id].wins + rec[t.id].losses),
  })).sort((a,b) => b.wins - a.wins || b.pct - a.pct || a.losses - b.losses);
}

function CourtScorer({ div, week, slotIdx, court, otherCourt, activeScores, setActiveScores, results, setResults }) {
  const schedule = getSchedule(div);
  const wk = schedule.find(w => w.week === week);
  const slot = wk?.slots[slotIdx];
  const courtKey = court === 1 ? 'court1' : 'court2';
  const g = slot?.[courtKey];
  const k = gameKey(div, week, slotIdx, court);
  const otherK = gameKey(div, week, slotIdx, otherCourt);
  const otherG = slot?.[otherCourt === 1 ? 'court1' : 'court2'];

  const stored = results[k];
  const isComplete = stored?.winner;

  const [sA, setSA] = useState(() => {
    if (stored) return stored.scoreA;
    return activeScores[k]?.scoreA ?? 4;
  });
  const [sB, setSB] = useState(() => {
    if (stored) return stored.scoreB;
    return activeScores[k]?.scoreB ?? 4;
  });

  const winner = checkWinner(sA, sB);

  useEffect(() => {
    if (!isComplete) {
      const updated = { ...activeScores, [k]: { scoreA: sA, scoreB: sB } };
      setActiveScores(updated);
    }
  }, [sA, sB]);

  const adj = (setter, score, opp, delta) => {
    if (winner) return;
    const next = Math.max(0, Math.min(27, score + delta));
    setter(next);
  };

  const saveResult = () => {
    if (!winner) return;
    const updated = { ...results, [k]: { scoreA: sA, scoreB: sB, winner } };
    setResults(updated);
  };

  useEffect(() => {
    if (winner && !isComplete) saveResult();
  }, [winner]);

  const reset = () => {
    const newActive = { ...activeScores };
    delete newActive[k];
    setActiveScores(newActive);
    const newRes = { ...results };
    delete newRes[k];
    setResults(newRes);
    setSA(4); setSB(4);
  };

  const otherStored = results[otherK];
  const otherActive = activeScores[otherK];
  const otherSA = otherStored?.scoreA ?? otherActive?.scoreA ?? 4;
  const otherSB = otherStored?.scoreB ?? otherActive?.scoreB ?? 4;

  if (!g) return (
    <div style={{padding:20,textAlign:'center',color:'var(--text3)'}}>No match on this court</div>
  );

  const nameA = getTeamName(div, g.a);
  const nameB = getTeamName(div, g.b);
  const refName = getTeamName(div, g.ref);

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div className="score-header">
        <div className="score-header-left">
          <div className="court-tag">Court {court} · Week {week} · {slot.time}</div>
          <div className="score-week-info">Ref: T{g.ref} {refName}</div>
        </div>
      </div>
      <div className="score-main">
        {winner && (
          <div className="win-banner">
            {winner === 'A' ? nameA : nameB} wins! 🏆
          </div>
        )}
        <div className="score-note">Start at 4-4 · Win by 2 · Cap 27</div>
        <div className="teams-row">
          <div className={`team-scorer ${winner==='A'?'winner':''}`}>
            <div className={`scorer-name ${winner==='A'?'winner-name':''}`}>T{g.a} {nameA}</div>
            <div className={`score-display ${winner==='A'?'winner-score':''}`}>{sA}</div>
            <button className="score-btn score-btn-plus" disabled={!!winner} onClick={() => adj(setSA, sA, sB, 1)}>+</button>
            <button className="score-btn score-btn-minus" disabled={!!winner || sA <= 0} onClick={() => adj(setSA, sA, sB, -1)}>−</button>
          </div>
          <div style={{display:'flex',alignItems:'center',padding:'0 4px',color:'var(--text3)',fontWeight:800,fontSize:18}}>VS</div>
          <div className={`team-scorer ${winner==='B'?'winner':''}`}>
            <div className={`scorer-name ${winner==='B'?'winner-name':''}`}>T{g.b} {nameB}</div>
            <div className={`score-display ${winner==='B'?'winner-score':''}`}>{sB}</div>
            <button className="score-btn score-btn-plus" disabled={!!winner} onClick={() => adj(setSB, sB, sA, 1)}>+</button>
            <button className="score-btn score-btn-minus" disabled={!!winner || sB <= 0} onClick={() => adj(setSB, sB, sA, -1)}>−</button>
          </div>
        </div>
        {winner && (
          <button className="reset-btn" onClick={reset}>Reset Game</button>
        )}
        {otherG && (
          <div className="mini-court">
            <div className="mini-label">Court {otherCourt}</div>
            <div className="mini-scores">
              <span className="mini-team">T{otherG.a}</span>
              <span className="mini-score">{otherSA}</span>
              <span className="mini-vs">–</span>
              <span className="mini-score">{otherSB}</span>
              <span className="mini-team">T{otherG.b}</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

                  borderColor: activeCourt===c ? 'var(--gold)' : 'var(--border)'
                }}>C{c}</button>
            ))}
          </div>
        </div>
        <div style={{flex:1,overflow:'hidden'}}>
          <CourtScorer
            div={selected.div}
            week={selected.week}
            slotIdx={selected.slotIdx}
            court={activeCourt}
            otherCourt={activeCourt===1?2:1}
            activeScores={activeScores}
            setActiveScores={setActiveScores}
            results={results}
            setResults={setResults}
          />
        </div>
      </div>
    );
  }

  return (
    <div className="page">
      <div className="header">
        <div style={{fontSize:22,fontWeight:900,letterSpacing:'-0.3px'}}>Score</div>
        <div style={{fontSize:11,color:'var(--text2)',letterSpacing:'0.1em',textTransform:'uppercase',marginTop:2}}>Select a game</div>
      </div>
      <div className="div-toggle">
        <button className={`div-btn ${activeDiv==='adv'?'active':''}`} onClick={()=>setActiveDiv('adv')}>Advanced · Wed</button>
        <button className={`div-btn ${activeDiv==='int'?'active':''}`} onClick={()=>setActiveDiv('int')}>Intermediate · Thu</button>
      </div>
      <div style={{padding:'16px 20px 0'}}>
        {getSchedule(activeDiv).map(wk => (
          <div key={wk.week} className="week-section">
            <div className="week-section-title">Week {wk.week} · {wk.date}</div>
            {wk.slots.flatMap((slot, si) =>
              [1,2].map(cNum => {
                const ct = cNum === 1 ? 'court1' : 'court2';
                const g = slot[ct];
                if (!g) return null;
                const k = gameKey(activeDiv, wk.week, si, cNum);
                const r = results[k];
                const active = activeScores[k];
                return (
                  <div key={`${si}-${cNum}`} className="game-option"
                    onClick={() => setSelected({ div: activeDiv, week: wk.week, slotIdx: si, court: cNum })}>
                    <div className="game-option-top">
                      <div className="game-option-teams">
                        T{g.a} {getTeamName(activeDiv,g.a)} <span style={{color:'var(--text3)'}}>vs</span> T{g.b} {getTeamName(activeDiv,g.b)}
                      </div>
                      {r?.winner && <span className="game-complete-badge">✓ Done</span>}
                    </div>
                    <div className="game-option-bottom">
                      {slot.time} · Court {cNum} · Ref: T{g.ref} {getTeamName(activeDiv,g.ref)}
                      {r?.winner && <span style={{color:'var(--text2)',marginLeft:8}}>{r.scoreA}–{r.scoreB}</span>}
                      {active && !r?.winner && <span style={{color:'var(--gold)',marginLeft:8}}>In progress: {active.scoreA}–{active.scoreB}</span>}
                    </div>
                  </div>
                );
              }).filter(Boolean)
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// =================== ALL STARS PAGE ===================

function AllStarsPage({ results, allStars, setAllStars }) {
  const [div, setDiv] = useState('adv');
  const [week, setWeek] = useState(1);
  const [view, setView] = useState('select'); // 'select' | 'board'

  const schedule = getSchedule(div);
  const wkData = schedule.find(w => w.week === week);
  const teams = div === 'adv' ? ADV_TEAMS : INT_TEAMS;

  // Collect all games that happened (ref is present)
  const games = [];
  if (wkData) {
    wkData.slots.forEach((slot, si) => {
      ['court1','court2'].forEach((ct, ci) => {
        const g = slot[ct];
        if (!g) return;
        games.push({ slot, si, ct, ci, g, courtNum: ci+1 });
      });
    });
  }

  // Allstar leaderboard across all weeks
  const allStarCounts = {};
  Object.entries(allStars).forEach(([key, playerName]) => {
    if (!playerName) return;
    // key format: div_w{week}_s{si}_c{c}_{team}
    const divKey = key.startsWith('adv') ? 'adv' : 'int';
    if (divKey !== div) return;
    if (!allStarCounts[playerName]) allStarCounts[playerName] = { count: 0, team: '' };
    allStarCounts[playerName].count++;
    // figure out team
    const playerTeam = teams.find(t => t.players.includes(playerName));
    if (playerTeam) allStarCounts[playerName].team = playerTeam.name;
  });
  const leaderboard = Object.entries(allStarCounts)
    .map(([name, d]) => ({ name, ...d }))
    .sort((a,b) => b.count - a.count);

  const setAllStar = (gameKey, side, player) => {
    const k = `${gameKey}_${side}`;
    setAllStars({ ...allStars, [k]: player });
  };

  return (
    <div className="page">
      <div className="header">
        <div style={{fontSize:22,fontWeight:900,letterSpacing:'-0.3px'}}>All-Stars</div>
        <div style={{fontSize:11,color:'var(--text2)',letterSpacing:'0.1em',textTransform:'uppercase',marginTop:2}}>Weekly selection</div>
      </div>
      <div className="div-toggle">
        <button className={`div-btn ${div==='adv'?'active':''}`} onClick={()=>{setDiv('adv');setWeek(1);}}>Advanced · Wed</button>
        <button className={`div-btn ${div==='int'?'active':''}`} onClick={()=>{setDiv('int');setWeek(1);}}>Intermediate · Thu</button>
      </div>

      {/* Sub tabs */}
      <div style={{display:'flex',gap:0,margin:'12px 20px 0',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
        <button className={`div-btn ${view==='select'?'active':''}`} style={{fontSize:11}} onClick={()=>setView('select')}>Select All-Stars</button>
        <button className={`div-btn ${view==='board'?'active':''}`} style={{fontSize:11}} onClick={()=>setView('board')}>Leaderboard</button>
      </div>

      {view === 'select' && (
        <>
          <div className="week-pill-row">
            {schedule.map(w => (
              <button key={w.week} className={`week-pill ${week===w.week?'active':''}`} onClick={()=>setWeek(w.week)}>
                Wk {w.week}
              </button>
            ))}
          </div>
          <div style={{padding:'0 20px'}}>
            {games.map(({ slot, si, ct, g, courtNum }) => {
              const teamA = teams.find(t => t.id === g.a);
              const teamB = teams.find(t => t.id === g.b);
              const refTeam = teams.find(t => t.id === g.ref);
              const gk = gameKey(div, week, si, courtNum);
              const selA = allStars[`${gk}_teamA`] || '';
              const selB = allStars[`${gk}_teamB`] || '';
              return (
                <div key={`${si}-${courtNum}`} className="allstar-game-card">
                  <div className="allstar-game-header">
                    <div className="allstar-game-title">Court {courtNum} · {slot.time} · T{g.a} vs T{g.b}</div>
                    <div className="allstar-ref">Ref: T{g.ref} {refTeam?.name}</div>
                  </div>
                  <div className="allstar-teams">
                    <div className="allstar-team-col">
                      <div className="allstar-team-name">T{g.a} {teamA?.name}</div>
                      <select className="player-select" value={selA}
                        onChange={e => setAllStar(gk,'teamA',e.target.value)}>
                        <option value="">— Pick All-Star —</option>
                        {teamA?.players.map(p => <option key={p} value={p}>{p}</option>)}
                      </select>
                    </div>
                    <div className="allstar-team-col">
                      <div className="allstar-team-name">T{g.b} {teamB?.name}</div>
                      <select className="player-select" value={selB}
                        onChange={e => setAllStar(gk,'teamB',e.target.value)}>
                        <option value="">— Pick All-Star —</option>
                        {teamB?.players.map(p => <option key={p} value={p}>{p}</option>)}
                      </select>
                    </div>
                  </div>
                </div>
              );
            })}
            {games.length === 0 && (
              <div className="empty-state">
                <div className="empty-state-title">No games this week</div>
              </div>
            )}
          </div>
        </>
      )}

      {view === 'board' && (
        <div style={{marginTop:16}}>
          <div className="section-label">All-Star Nominations · {div==='adv'?'Advanced':'Intermediate'}</div>
          {leaderboard.length === 0 && (
            <div className="empty-state">
              <div className="empty-state-title">No All-Stars selected yet</div>
              <div style={{fontSize:12,color:'var(--text3)'}}>Use the ref team to select All-Stars each week</div>
            </div>
          )}
          <div className="allstar-leaderboard">
            {leaderboard.map((entry, idx) => (
              <div key={entry.name} className="allstar-row">
                <div className="allstar-rank">{idx+1}</div>
                <div style={{flex:1}}>
                  <div className="allstar-player">{entry.name}</div>
                  <div className="allstar-team-tag">{entry.team}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{color:'var(--gold)',fontSize:14}}>★</span>
                  <span className="allstar-count">{entry.count}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
      <div style={{height:16}}/>
    </div>
  );
}

// =================== APP ===================

function App() {
  const [tab, setTab] = useState('board');
  const [results, setResultsRaw] = useStorage('bof_results', {});
  const [activeScores, setActiveScoresRaw] = useStorage('bof_active', {});
  const [allStars, setAllStarsRaw] = useStorage('bof_allstars', {});

  const setResults = (v) => setResultsRaw(typeof v === 'function' ? v(results) : v);
  const setActiveScores = (v) => setActiveScoresRaw(typeof v === 'function' ? v(activeScores) : v);
  const setAllStars = (v) => setAllStarsRaw(typeof v === 'function' ? v(allStars) : v);

  const tabs = [
    { id:'board', label:'Board', Icon: IconTrophy },
    { id:'schedule', label:'Schedule', Icon: IconCalendar },
    { id:'score', label:'Score', Icon: IconScore },
    { id:'stars', label:'All-Stars', Icon: IconStar },
  ];

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {tab === 'board' && <LeaderboardPage results={results} />}
        {tab === 'schedule' && <SchedulePage results={results} />}
        {tab === 'score' && (
          <ScorePage
            activeScores={activeScores}
            setActiveScores={setActiveScores}
            results={results}
            setResults={setResults}
          />
        )}
        {tab === 'stars' && (
          <AllStarsPage
            results={results}
            allStars={allStars}
            setAllStars={setAllStars}
          />
        )}
      </div>
      <nav className="nav">
        {tabs.map(({ id, label, Icon }) => (
          <button key={id} className={`nav-btn ${tab===id?'active':''}`} onClick={() => setTab(id)}>
            <Icon />
            <span className="nav-label">{label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
